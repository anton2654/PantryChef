name: Deploy PantryChef to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  AZURE_WEBAPP_NAME: "pantrychef-web"
  WEB_PROJECT_PATH: "PantryChef.Web/PantryChef.Web.csproj"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore PantryChef.sln

      - name: Build solution
        run: dotnet build PantryChef.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test PantryChef.sln --configuration Release --no-build --verbosity normal

      - name: Publish web app
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
